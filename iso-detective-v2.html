<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ISO Detective — ISO/IEC 29119-4 Test Techniques</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet"/>
<style>
/* ===== KEYFRAMES ===== */
@keyframes grain { 0% { transform:translate(0,0); } 25% { transform:translate(-2%,1%); } 50% { transform:translate(1%,-1%); } 75% { transform:translate(-1%,2%); } 100% { transform:translate(0,0); } }
@keyframes raindrop { 0% { transform:translateY(-100vh) translateX(0); } 100% { transform:translateY(110vh) translateX(-30px); } }
@keyframes drift { 0% { transform:translate(0,100vh) scale(0.4);opacity:0; } 10% { opacity:1; } 90% { opacity:1; } 100% { transform:translate(60px,-10vh) scale(1.4);opacity:0; } }
@keyframes pulse { 0% { transform:scale(0.8);opacity:1; } 100% { transform:scale(2.6);opacity:0; } }
@keyframes blink { 50% { opacity:0; } }
@keyframes slamDown { 0% { transform:translateY(-120vh) rotate(-3deg); } 70% { transform:translateY(8px) rotate(0.5deg); } 85% { transform:translateY(-4px) rotate(-0.2deg); } 100% { transform:translateY(0) rotate(0); } }
@keyframes stampIn { 0% { transform:rotate(20deg) scale(2);opacity:0; } 60% { transform:rotate(-15deg) scale(0.92);opacity:1; } 100% { transform:rotate(-12deg) scale(1);opacity:0.92; } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes modalIn { from { transform:translateY(22px);opacity:0; } to { transform:translateY(0);opacity:1; } }
@keyframes shake { 0%,100% { transform:translateX(0); } 20% { transform:translateX(-14px); } 40% { transform:translateX(11px); } 60% { transform:translateX(-7px); } 80% { transform:translateX(5px); } }
@keyframes rankIn { from { transform:scale(0);opacity:0; } 60% { transform:scale(1.1); } to { transform:scale(1);opacity:1; } }
@keyframes flashRed { 0% { opacity:1; } 100% { opacity:0.08; } }
@keyframes flashBlue { 0% { opacity:0.08; } 100% { opacity:1; } }
@keyframes sirenR { 0% { opacity:1;box-shadow:0 0 30px #EF4444,0 0 60px rgba(239,68,68,0.5); } 100% { opacity:0.15;box-shadow:none; } }
@keyframes sirenB { 0% { opacity:0.15;box-shadow:none; } 100% { opacity:1;box-shadow:0 0 30px #3B82F6,0 0 60px rgba(59,130,246,0.5); } }
@keyframes carSlide { from { transform:translateY(-40px);opacity:0; } to { transform:translateY(0);opacity:1; } }
@keyframes titlePop { from { transform:scale(0);opacity:0; } to { transform:scale(1);opacity:1; } }
@keyframes cry { 0% { transform:scale(1) rotate(-8deg); } 100% { transform:scale(1.15) rotate(8deg); } }
@keyframes suspectArrive { from { transform:translateY(50px);opacity:0; } to { transform:translateY(0);opacity:1; } }
@keyframes hintspin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }

/* ===== BASE ===== */
*{ box-sizing:border-box; }
html,body{ margin:0;padding:0;background:#050709;color:#F0EDE8;font-family:'Inter',system-ui,sans-serif;min-height:100vh;overflow-x:hidden; }
:root{
  --bg-primary:#080810;--bg-surface:#0D1117;--bg-elev:#161B22;--bg-card:#1c232b;
  --amber:#F59E0B;--gold:#D97706;--red:#EF4444;--green:#10B981;--blue:#3B82F6;
  --text:#F0EDE8;--text-2:#9CA3AF;--text-3:#4B5563;
  --line:#1f2a36;--paper:#f4ead6;--polaroid:#fdfaf3;
  --serif:'Playfair Display','Times New Roman',serif;
  --mono:'Courier Prime','Courier New',monospace;
  --stamp:'Special Elite','Courier New',monospace;
}
body{ background:radial-gradient(ellipse at 50% 0%,#14171f 0%,#080810 60%,#050709 100%);background-attachment:fixed; }
#root{ min-height:100vh; }
.app{ position:relative;min-height:100vh; }
.app.no-anim *,.app.no-anim *::before,.app.no-anim *::after{ animation-duration:0.001s !important;transition-duration:0.001s !important; }

/* ===== BUTTONS ===== */
.btn{ font-family:var(--stamp);font-size:14px;letter-spacing:0.08em;text-transform:uppercase;padding:14px 22px;border:1px solid;background:transparent;color:var(--text);cursor:pointer;transition:all 200ms ease; }
.btn--primary{ background:var(--amber);border-color:var(--amber);color:#1a1209; }
.btn--primary:hover:not(:disabled){ background:var(--gold);border-color:var(--gold);box-shadow:0 0 22px rgba(245,158,11,0.45); }
.btn--primary:disabled{ opacity:0.35;cursor:not-allowed; }
.btn--ghost{ border-color:var(--line);color:var(--text-2); }
.btn--ghost:hover{ border-color:var(--amber);color:var(--amber); }
.btn--sm{ padding:8px 14px;font-size:11px; }
.link{ background:none;border:none;color:var(--amber);font-family:var(--mono);cursor:pointer; }
.link:hover{ color:var(--gold); }

/* ===== SCREENS ===== */
.screen{ position:relative;min-height:100vh; }

/* ===== CASE FILE ===== */
.screen--case{ display:flex;align-items:center;justify-content:center;padding:40px 20px;min-height:100vh; }
.desk-bg{ position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 30%,rgba(245,158,11,0.07),transparent 50%),repeating-linear-gradient(38deg,#1a1208 0 4px,#1f1610 4px 12px),#0a0805;opacity:0.95; }
.folder{ position:relative;width:100%;max-width:760px;z-index:10;background:linear-gradient(180deg,#5b4520 0%,#3a2818 100%);border:2px solid #2a1d0e;box-shadow:0 30px 80px rgba(0,0,0,0.75);transform:translateY(-120vh) rotate(-3deg);padding-top:26px; }
.folder.is-down{ animation:slamDown 800ms cubic-bezier(.2,1,.3,1) forwards; }
.folder.no-anim{ transform:none;animation:none; }
.folder__tab{ position:absolute;top:0;left:40px;transform:translateY(-100%);background:#5b4520;padding:8px 20px;font-family:var(--mono);font-size:13px;letter-spacing:0.2em;color:#f4ead6;border:2px solid #2a1d0e;border-bottom:none; }
.folder__cover{ padding:50px 60px;position:relative;background:repeating-linear-gradient(0deg,transparent 0 22px,rgba(0,0,0,0.06) 22px 23px),linear-gradient(180deg,#d97706 0%,#a3580a 100%);display:flex;flex-direction:column;align-items:center;min-height:220px;border-bottom:4px double #2a1d0e; }
.folder__inside{ background:var(--polaroid);padding:36px 60px 40px;color:#1a1209;max-height:0;overflow:hidden;transition:max-height 600ms ease; }
.folder__inside.is-open{ max-height:900px; }
.folder.no-anim .folder__inside{ max-height:900px; }
.case-meta{ display:flex;gap:36px;padding-bottom:18px;border-bottom:1px dashed #5b4520; }
.case-meta div{ font-family:var(--mono); }
.case-meta span{ display:block;font-size:10px;letter-spacing:0.2em;color:#5b4520;text-transform:uppercase; }
.case-meta b{ font-size:18px;color:#1a1209; }
.sev--critical{ color:var(--red) !important; }.sev--high{ color:var(--gold) !important; }.sev--medium{ color:var(--amber) !important; }
.case-title{ font-family:var(--serif);font-size:36px;margin:22px 0 12px;color:#1a1209;line-height:1.15; }
.case-summary{ font-family:var(--mono);font-size:14px;line-height:1.7;color:#1a1209;min-height:90px; }
.case-hook{ font-family:var(--serif);font-style:italic;font-size:18px;color:#5b4520;margin:18px 0;padding-left:14px;border-left:3px solid var(--red); }
.case-teach{ font-family:var(--mono);font-size:12px;color:#2a1d0e;background:rgba(91,69,32,0.1);padding:10px 14px;margin-bottom:24px; }
.case-begin{ width:100%; }

/* ===== INVESTIGATION ===== */
.screen--investigation{ padding:16px;min-height:100vh;display:flex;flex-direction:column; }
.topbar{ display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:rgba(13,17,23,0.88);border:1px solid var(--line);margin-bottom:14px;backdrop-filter:blur(6px); }
.topbar__case{ display:flex;gap:16px;align-items:baseline; }
.topbar__code{ font-family:var(--mono);color:var(--amber);letter-spacing:0.2em;font-size:11px; }
.topbar__title{ font-family:var(--serif);font-size:22px; }
.topbar__progress{ display:flex;gap:14px;align-items:center; }
.pill{ background:var(--bg-elev);border:1px solid var(--line);padding:6px 14px;display:flex;gap:10px;align-items:baseline; }
.pill__label{ font-family:var(--mono);font-size:10px;letter-spacing:0.18em;color:var(--text-2);text-transform:uppercase; }
.pill__v{ font-family:var(--stamp);font-size:16px; }
.pill__v small{ font-size:11px;color:var(--text-3); }
.pill--amber .pill__v{ color:var(--amber); }.pill--green .pill__v{ color:var(--green); }
.timer{ font-family:var(--stamp);font-size:22px;color:var(--text);border:1px solid var(--line);padding:6px 16px;letter-spacing:0.1em;background:var(--bg-elev); }
.timer.is-low{ color:var(--red);border-color:var(--red);animation:pulseRed 1s ease-in-out infinite; }
@keyframes pulseRed{ 0%,100%{ box-shadow:0 0 0 0 rgba(239,68,68,0); } 50%{ box-shadow:0 0 0 6px rgba(239,68,68,0.25); } }
.invest-grid{ display:grid;grid-template-columns:1.85fr 1fr;gap:14px;flex:1;min-height:0; }
.invest-scene{ position:relative;background:var(--bg-primary);border:1px solid var(--line);overflow:hidden; }
.scene-caption{ position:absolute;bottom:8px;left:12px;font-family:var(--mono);font-size:10px;letter-spacing:0.2em;color:var(--text-3);text-transform:uppercase;pointer-events:none; }

/* ===== BOARD ===== */
.board{ background:repeating-linear-gradient(90deg,rgba(0,0,0,0.04) 0 1px,transparent 1px 6px),linear-gradient(180deg,#2a1d12 0%,#1a120a 100%);border:4px solid #3a2818;padding:16px;display:flex;flex-direction:column;min-height:0;overflow:hidden;box-shadow:inset 0 0 80px rgba(0,0,0,0.65); }
.board__head{ padding-bottom:10px;border-bottom:1px dashed #5b4520;margin-bottom:12px; }
.board__head h3{ font-family:var(--serif);margin:0;font-size:22px;color:#f4ead6;letter-spacing:0.05em; }
.board__hint{ font-family:var(--mono);font-size:11px;margin-top:4px;transition:color 200ms; }
.board__layout{ display:grid;grid-template-columns:1.2fr 1fr;gap:12px;flex:1;min-height:0; }
.board__sect{ font-family:var(--stamp);font-size:12px;color:var(--amber);letter-spacing:0.3em;margin-bottom:8px; }
.board__evidence,.board__techs{ padding-right:4px;min-height:0; }
.board__evidence{ overflow:visible;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;align-content:start; }
.board__techs{ overflow-y:auto; }
.board__techs::-webkit-scrollbar{ width:5px; }
.board__techs::-webkit-scrollbar-thumb{ background:#5b4520; }
.board__empty{ font-family:var(--mono);color:var(--text-3);font-size:12px;font-style:italic;padding:20px;text-align:center;grid-column:1/-1; }

/* ===== POLAROID ===== */
.polaroid{ display:block;width:100%;text-align:left;cursor:pointer;background:var(--polaroid);color:#1a1209;padding:10px 10px 18px;border:none;margin-bottom:0;position:relative;box-shadow:0 6px 14px rgba(0,0,0,0.4),0 1px 2px rgba(0,0,0,0.6);transition:transform 200ms ease,box-shadow 200ms ease; }
.polaroid:hover{ transform:rotate(0deg) translateY(-3px) !important;box-shadow:0 12px 22px rgba(0,0,0,0.6);z-index:5; }
.polaroid.is-linking{ outline:2px solid var(--amber);outline-offset:4px;transform:rotate(0deg) !important;z-index:6; }
.polaroid.is-solved{ opacity:0.65; }
.polaroid__corner{ position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:9px;color:#fff;background:var(--red);padding:2px 6px;letter-spacing:0.1em; }
.polaroid__title{ font-family:var(--stamp);font-size:12px;margin-bottom:4px;padding-right:64px;line-height:1.2; }
.polaroid__body{ font-family:var(--mono);font-size:10px;line-height:1.35;color:#2a1d0e; }
.polaroid__iso{ margin-top:6px;font-family:var(--mono);font-size:8px;color:#5b4520;letter-spacing:0.1em; }
.polaroid__solved{ position:absolute;bottom:3px;right:6px;font-family:var(--stamp);font-size:10px;color:var(--green);letter-spacing:0.08em; }
.polaroid__scan{ position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,0.04) 2px 3px); }

/* ===== TECH CARDS ===== */
.tech{ display:block;width:100%;text-align:left;cursor:pointer;background:var(--bg-elev);border:1px solid var(--line);color:var(--text);padding:10px 14px;margin-bottom:8px;transition:all 180ms ease; }
.tech:disabled{ opacity:0.55;cursor:default; }
.tech.is-pickable:not(:disabled){ border-color:var(--amber); }
.tech.is-pickable:hover:not(:disabled){ background:#20272f;box-shadow:0 0 0 3px rgba(245,158,11,0.18);transform:translateY(-1px); }
.tech.is-used{ background:rgba(16,185,129,0.08);border-color:var(--green); }
.tech__cat{ font-family:var(--mono);font-size:9px;letter-spacing:0.2em;color:var(--amber);text-transform:uppercase; }
.tech__name{ font-family:var(--serif);font-size:16px;margin-top:2px; }
.tech__short{ font-family:var(--mono);font-size:10px;color:var(--text-2);letter-spacing:0.1em;margin-top:2px; }

/* ===== MODALS ===== */
.modal-shade{ position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);animation:fadeIn 200ms ease; }
.modal{ background:var(--bg-surface);border:1px solid var(--line);max-width:720px;width:100%;max-height:90vh;overflow-y:auto;padding:36px;position:relative;animation:modalIn 280ms cubic-bezier(.2,1,.3,1); }
.modal h3{ font-family:var(--serif);font-size:28px;margin:16px 0 8px; }
.modal__lead{ font-family:var(--mono);color:var(--text-2);font-size:13px; }
.modal__lead b{ color:var(--text); }
.modal p{ line-height:1.65;color:var(--text-2); }
.modal__why{ background:rgba(245,158,11,0.07);border-left:3px solid var(--amber);padding:12px 16px;font-family:var(--mono);font-size:13px;color:var(--text); }
.modal__points{ font-family:var(--stamp);color:var(--green);font-size:28px;margin:16px 0; }
.modal__iso{ font-family:var(--mono);font-size:11px;color:var(--text-3);letter-spacing:0.15em;margin-bottom:18px; }
.modal__stamp{ position:absolute;top:24px;right:32px;font-family:var(--stamp);font-size:20px;padding:6px 14px;border:3px double;transform:rotate(-8deg);letter-spacing:0.15em; }
.modal__stamp--green{ color:var(--green);border-color:var(--green); }
.modal__stamp--red{ color:var(--red);border-color:var(--red); }
.modal--correct{ border-left:4px solid var(--green); }
.modal--wrong{ border-left:4px solid var(--red);animation:shake 450ms ease-in-out; }

/* ===== FIELD GUIDE ===== */
.guide{ background:var(--bg-surface);border:1px solid var(--line);max-width:880px;width:100%;max-height:90vh;display:flex;flex-direction:column;animation:modalIn 280ms cubic-bezier(.2,1,.3,1); }
.guide__head{ display:flex;justify-content:space-between;align-items:center;padding:24px 28px;border-bottom:1px solid var(--line); }
.guide__eyebrow{ font-family:var(--mono);color:var(--amber);letter-spacing:0.25em;font-size:10px; }
.guide h2{ font-family:var(--serif);margin:4px 0 0;font-size:32px; }
.x{ background:none;border:none;color:var(--text-2);font-size:32px;cursor:pointer; }
.x:hover{ color:var(--text); }
.guide__tabs{ display:flex;gap:4px;padding:12px 28px;border-bottom:1px solid var(--line); }
.guide__tabs button{ background:transparent;border:1px solid var(--line);color:var(--text-2);font-family:var(--mono);font-size:11px;padding:6px 14px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase; }
.guide__tabs .is-on{ background:var(--amber);border-color:var(--amber);color:#1a1209; }
.guide__body{ padding:16px 28px 28px;overflow-y:auto; }
.guide__item{ padding:16px 0;border-bottom:1px dashed var(--line); }
.guide__row{ display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px; }
.guide__item h4{ font-family:var(--serif);font-size:18px;margin:0; }
.guide__item h4 small{ font-family:var(--mono);color:var(--amber);margin-left:8px;font-size:11px;letter-spacing:0.1em; }
.guide__iso{ font-family:var(--mono);font-size:10px;color:var(--text-3);letter-spacing:0.15em; }
.guide__item p{ color:var(--text-2);font-size:13px;line-height:1.6;margin:4px 0; }
.guide__meta{ display:flex;gap:24px;font-family:var(--mono);font-size:11px;color:var(--text-3);margin-top:6px; }
.guide__meta b{ color:var(--amber); }
.guide__item--black{ border-left:3px solid var(--amber);padding-left:12px; }
.guide__item--white{ border-left:3px solid var(--blue);padding-left:12px; }
.guide__item--experience{ border-left:3px solid var(--green);padding-left:12px; }
.guide-toggle{ position:fixed;bottom:16px;left:16px;z-index:50;background:var(--bg-elev);border:1px solid var(--amber);color:var(--amber);padding:10px 16px;font-family:var(--mono);font-size:12px;letter-spacing:0.15em;cursor:pointer; }
.guide-toggle:hover{ background:var(--amber);color:#1a1209; }

/* ===== VERDICT ===== */
.screen--verdict{ padding:48px 24px;max-width:1120px;margin:0 auto; }
.verdict__head{ text-align:center;margin-bottom:32px; }
.verdict__case{ font-family:var(--mono);color:var(--amber);letter-spacing:0.25em;font-size:12px; }
.verdict__head h1{ font-family:var(--serif);font-size:72px;letter-spacing:0.04em;margin:8px 0 0;text-shadow:0 0 30px rgba(245,158,11,0.3); }
.rank-badge{ background:var(--bg-surface);border:1px solid var(--amber);padding:32px;text-align:center;margin-bottom:36px;position:relative;max-width:560px;margin-left:auto;margin-right:auto;background-image:radial-gradient(ellipse at center,rgba(245,158,11,0.12),transparent 70%);transform:scale(0);opacity:0; }
.rank-badge.in{ animation:rankIn 700ms cubic-bezier(.34,1.56,.64,1) forwards; }
.app.no-anim .rank-badge{ transform:scale(1);opacity:1; }
.rank-badge--big{ padding:48px;max-width:680px; }
.rank-badge__glyph{ font-size:64px; }
.rank-badge__label{ font-family:var(--serif);font-size:36px;margin:12px 0 4px;color:var(--amber);letter-spacing:0.04em; }
.rank-badge__pct{ font-family:var(--stamp);font-size:56px;letter-spacing:0.05em; }
.rank-badge__score{ font-family:var(--mono);color:var(--text-2);font-size:14px; }
.rank-badge__score span{ color:var(--amber);font-size:20px; }
.rank-badge__quote{ font-family:var(--serif);font-style:italic;color:var(--text);margin-top:18px;padding-top:16px;border-top:1px dashed var(--line);font-size:16px; }
.verdict__cols{ display:grid;grid-template-columns:1fr 1fr;gap:24px; }
.solved-h,.cold-h{ font-family:var(--stamp);letter-spacing:0.3em;font-size:14px;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--line); }
.solved-h{ color:var(--green); }.cold-h{ color:var(--red); }
.empty{ font-family:var(--mono);color:var(--text-3);padding:24px;text-align:center;border:1px dashed var(--line); }
.solved-card{ background:rgba(16,185,129,0.06);border:1px solid var(--green);border-left:4px solid var(--green);padding:14px 18px;margin-bottom:10px;position:relative;overflow:hidden; }
.solved-card__stamp{ position:absolute;top:10px;right:12px;font-family:var(--stamp);font-size:11px;color:var(--green);letter-spacing:0.2em;border:2px solid var(--green);padding:2px 8px;transform:rotate(-6deg); }
.solved-card__title{ font-family:var(--mono);font-size:13px;padding-right:80px; }
.solved-card__tech{ font-family:var(--mono);font-size:12px;color:var(--green);margin-top:4px; }
.cold-card{ background:rgba(239,68,68,0.05);border:1px solid var(--red);border-left:4px solid var(--red);padding:14px 18px;margin-bottom:10px; }
.cold-card__title{ font-family:var(--mono);font-size:13px;color:var(--text); }
.cold-card__lesson{ margin-top:8px;font-family:var(--mono);font-size:12px;color:var(--text-2);line-height:1.6; }
.cold-card__lesson b{ color:var(--red); }
.cold-card__iso{ font-family:var(--mono);font-size:10px;color:var(--text-3);letter-spacing:0.15em;margin-top:6px; }
.verdict__actions{ display:flex;gap:12px;justify-content:center;margin-top:32px; }
.case-table{ width:100%;max-width:680px;margin:0 auto 24px;border-collapse:collapse; }
.case-table th,.case-table td{ padding:12px 16px;border-bottom:1px solid var(--line);font-family:var(--mono);text-align:left; }
.case-table th{ font-size:10px;letter-spacing:0.2em;color:var(--text-2);text-transform:uppercase; }
.case-table td{ font-size:14px; }

/* ===== IMPROVEMENT ===== */
.screen--improve{ padding:48px 24px;max-width:1000px;margin:0 auto; }
.improve__head{ text-align:center;margin-bottom:40px; }
.improve__eyebrow{ font-family:var(--mono);color:var(--amber);letter-spacing:0.3em;font-size:11px;margin-bottom:12px; }
.improve__head h1{ font-family:var(--serif);font-size:52px;margin:0; }
.improve__head h1 em{ color:var(--amber);font-style:italic; }
.improve__subtitle{ font-family:var(--mono);color:var(--text-2);font-size:13px;margin-top:12px;line-height:1.7;max-width:640px;margin-left:auto;margin-right:auto; }
.improve__instruction{ font-family:var(--stamp);font-size:13px;letter-spacing:0.2em;color:var(--amber);border:1px solid rgba(245,158,11,0.3);padding:12px 20px; }
.improve__grid{ display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:36px; }
.improve-card{ background:var(--bg-surface);border:2px solid var(--line);padding:22px;cursor:pointer;transition:all 200ms ease;position:relative;text-align:left; }
.improve-card:hover{ border-color:var(--amber);background:var(--bg-elev);transform:translateY(-2px); }
.improve-card.is-selected{ border-color:var(--green);background:rgba(16,185,129,0.06); }
.improve-card.is-selected::after{ content:'✓ SELECTED';position:absolute;top:12px;right:14px;font-family:var(--stamp);font-size:10px;color:var(--green);letter-spacing:0.15em; }
.improve-card__icon{ font-size:28px;margin-bottom:10px; }
.improve-card__title{ font-family:var(--serif);font-size:18px;color:var(--text);margin-bottom:6px; }
.improve-card__desc{ font-family:var(--mono);font-size:12px;color:var(--text-2);line-height:1.6; }
.improve-card__iso{ font-family:var(--mono);font-size:10px;color:var(--amber);letter-spacing:0.1em;margin-top:8px; }
.improve-card__pts{ font-family:var(--stamp);font-size:12px;color:var(--green);margin-top:8px; }
.improve__score-preview{ background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.3);padding:20px 28px;text-align:center;margin-bottom:28px;max-width:500px;margin-left:auto;margin-right:auto; }
.improve__score-label{ font-family:var(--mono);font-size:11px;color:var(--text-2);letter-spacing:0.2em;text-transform:uppercase; }
.improve__score-val{ font-family:var(--stamp);font-size:42px;color:var(--amber);margin:4px 0; }
.improve__bonus{ font-family:var(--mono);font-size:12px;color:var(--green); }
.improve__actions{ display:flex;gap:12px;justify-content:center; }

/* ===== DASHBOARD ===== */
.screen--dash-auth{ display:flex;align-items:center;justify-content:center;min-height:100vh; }
.dash-gate{ background:var(--bg-surface);border:1px solid var(--line);padding:32px;width:380px; }
.dash-gate h2{ font-family:var(--serif);margin:0 0 8px; }
.dash-gate p{ color:var(--text-2);font-family:var(--mono);font-size:13px; }
.dash-gate input{ width:100%;background:var(--bg-primary);border:1px solid var(--line);color:var(--text);padding:12px 14px;font-family:var(--mono);margin:12px 0;font-size:16px; }
.dash-gate input:focus{ outline:none;border-color:var(--amber); }
.dash-gate .btn{ margin-right:8px; }
.screen--dashboard{ padding:32px;max-width:1280px;margin:0 auto; }
.dash-head{ display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--line); }
.dash-eyebrow{ font-family:var(--mono);color:var(--amber);letter-spacing:0.25em;font-size:11px; }
.dash-head h1{ font-family:var(--serif);margin:4px 0 0;font-size:36px; }
.dash-stats{ display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px; }
.stat{ background:var(--bg-surface);border:1px solid var(--line);padding:18px; }
.stat__l{ font-family:var(--mono);font-size:10px;color:var(--text-2);letter-spacing:0.2em;text-transform:uppercase; }
.stat__v{ font-family:var(--serif);font-size:38px;color:var(--amber);margin-top:4px;line-height:1; }
.stat__s{ font-family:var(--mono);font-size:11px;color:var(--text-3);margin-top:6px; }
.dash-grid{ display:grid;grid-template-columns:1fr 1fr;gap:16px; }
.dash-card{ background:var(--bg-surface);border:1px solid var(--line);padding:22px; }
.dash-card h3{ font-family:var(--serif);margin:0 0 14px;font-size:18px; }
.dash-card--students{ grid-column:span 2; }
.dash-card table{ width:100%;border-collapse:collapse; }
.dash-card th,.dash-card td{ padding:8px 12px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px;text-align:left; }
.dash-card th{ color:var(--text-2);letter-spacing:0.15em;font-size:10px;text-transform:uppercase; }
.diff-list{ display:flex;flex-direction:column;gap:6px; }
.diff-row{ display:grid;grid-template-columns:200px 1fr 50px;gap:10px;align-items:center;font-family:var(--mono);font-size:11px; }
.diff-row__n{ color:var(--text); }
.diff-row__bar{ background:var(--bg-elev);height:12px; }
.diff-row__v{ text-align:right;font-family:var(--stamp); }

/* ===== RESPONSIVE ===== */
@media(max-width:1080px){
  .invest-grid,.verdict__cols,.dash-grid,.dash-stats,.improve__grid{ grid-template-columns:1fr; }
  .board__layout{ grid-template-columns:1fr; }
  .board__evidence{ grid-template-columns:1fr;overflow-y:auto; }
  .dash-card--students{ grid-column:span 1; }
  .landing__cases{ grid-template-columns:1fr; }
}
</style>
</head>

// ═══════════════════════════════════════════════════════════════
//  TECHNIQUES
// ═══════════════════════════════════════════════════════════════
const TECHNIQUES = {
  "equivalence-partitioning": { id:"equivalence-partitioning", name:"Equivalence Partitioning", short:"EP", category:"Black-Box", iso:"ISO/IEC 29119-4 §5.2.2", definition:"Divides the input domain into partitions where all values behave equivalently. Tests one value from each partition — both valid AND invalid.", when:"Input has definable ranges or categories.", mistake:"Testing only valid inputs, ignoring invalid partitions.", hint:"Look for test plans that only test 'normal' values — what about zero, negative, or over-limit inputs?"},
  "boundary-value-analysis": { id:"boundary-value-analysis", name:"Boundary Value Analysis", short:"BVA", category:"Black-Box", iso:"ISO/IEC 29119-4 §5.2.3", definition:"Tests the values at and immediately around the edges of equivalence partitions: min−1, min, min+1, nominal, max−1, max, max+1.", when:"Always paired with Equivalence Partitioning.", mistake:"Testing the middle of a range but never the exact edges.", hint:"Focus on the specific values just at, just below, and just above defined limits."},
  "decision-table": { id:"decision-table", name:"Decision Table Testing", short:"DT", category:"Black-Box", iso:"ISO/IEC 29119-4 §5.2.5", definition:"Models complex business logic as combinations of conditions and resulting actions in a table. Each column is one test case.", when:"Multiple conditions interact to produce different outcomes.", mistake:"Testing conditions individually, never in combination.", hint:"When you see test cases that each test only ONE condition at a time, the gap is here."},
  "state-transition": { id:"state-transition", name:"State Transition Testing", short:"ST", category:"Black-Box", iso:"ISO/IEC 29119-4 §5.2.6", definition:"Tests behavior as the system transitions between defined states. Covers valid, invalid, and impossible transitions.", when:"System has distinct states (active, suspended, frozen, pending).", mistake:"Testing only the 'active' state, ignoring all other states.", hint:"Think about system states: what happens when an account is suspended, a patient is flagged, a device is in backup mode?"},
  "cause-effect": { id:"cause-effect", name:"Cause-Effect Graphing", short:"CEG", category:"Black-Box", iso:"ISO/IEC 29119-4 §5.2.7", definition:"Identifies cause-effect relationships between inputs and outputs as a boolean graph, then converts them into a decision table.", when:"Complex systems with many interacting inputs producing different outputs.", mistake:"Listing causes and effects but never modelling their logical interaction."},
  "pairwise": { id:"pairwise", name:"Pairwise Testing", short:"All-Pairs", category:"Black-Box", iso:"ISO/IEC 29119-4 §5.2.4", definition:"Tests every possible pair of parameter values at least once. Most defects are caused by the interaction of at most two parameters.", when:"Many input parameters; full combinatorial testing is impractical.", mistake:"Testing each parameter individually but never in combination."},
  "classification-tree": { id:"classification-tree", name:"Classification Tree Method", short:"CTM", category:"Black-Box", iso:"ISO/IEC 29119-4 §5.2.8", definition:"Organizes input parameters into a tree of classifications and classes, then systematically combines leaf nodes to generate test cases.", when:"Complex input domains with multiple classification dimensions.", mistake:"Leaving entire branches of the classification tree without any test cases."},
  "statement-testing": { id:"statement-testing", name:"Statement Testing", short:"STM", category:"White-Box", iso:"ISO/IEC 29119-4 §5.3.2", definition:"Designs tests so every executable statement in the code runs at least once. Measured as statement coverage %.", when:"Minimum coverage requirement for unit testing.", mistake:"Accepting low coverage (<60%) as adequate.", hint:"A coverage report showing large red/uncovered blocks is the clearest signal for this technique."},
  "branch-testing": { id:"branch-testing", name:"Branch Testing", short:"BT", category:"White-Box", iso:"ISO/IEC 29119-4 §5.3.3", definition:"Designs tests to execute every branch (true AND false) from every decision point. Subsumes statement coverage.", when:"Code contains if/else, switch, loops.", mistake:"Testing only the 'true' path of every condition.", hint:"When a flowchart shows one arrow with many tests and another arrow with none, that untested arrow is the branch."},
  "condition-testing": { id:"condition-testing", name:"Condition Testing", short:"CT", category:"White-Box", iso:"ISO/IEC 29119-4 §5.3.4", definition:"Each individual condition in a compound boolean expression must evaluate to both true and false at least once.", when:"Expressions combine multiple operands with &&, ||, !.", mistake:"Treating a compound expression as a single atomic condition."},
  "mcdc": { id:"mcdc", name:"Modified Condition / Decision Coverage", short:"MC/DC", category:"White-Box", iso:"ISO/IEC 29119-4 §5.3.5", definition:"Each condition in a decision must independently affect the outcome. Required for safety-critical systems (DO-178C, IEC 61508).", when:"Aerospace, medical, automotive safety-critical software.", mistake:"Picking test combinations that don't prove individual condition independence."},
  "path-testing": { id:"path-testing", name:"Path Testing", short:"PT", category:"White-Box", iso:"ISO/IEC 29119-4 §5.3.6", definition:"Designs tests to execute every possible path from entry to exit of a code unit. Most stringent structural technique.", when:"Critical algorithms where all execution paths must be verified.", mistake:"Stopping at branch coverage and assuming all paths are thereby covered."},

const AudioCtx=(()=>{let ctx=null;const get=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==="suspended")ctx.resume();return ctx;};return{get};})();
const playTone=(freq,dur=0.08,type="sine",gain=0.05)=>{try{const ctx=AudioCtx.get();const o=ctx.createOscillator();const g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=gain;o.connect(g);g.connect(ctx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);o.stop(ctx.currentTime+dur);}catch(e){}};
const playClick=()=>playTone(1200+Math.random()*200,0.04,"square",0.03);
const playStamp=()=>{playTone(80,0.18,"sawtooth",0.12);setTimeout(()=>playTone(60,0.12,"triangle",0.08),40);};
const playCorrect=()=>{playTone(660,0.1,"sine",0.06);setTimeout(()=>playTone(880,0.14,"sine",0.06),80);};
const playWrong=()=>{playTone(180,0.18,"sawtooth",0.08);setTimeout(()=>playTone(130,0.22,"sawtooth",0.07),60);};
const playReveal=()=>{for(let i=0;i<5;i++)setTimeout(()=>playTone(220+i*110,0.12,"triangle",0.05),i*80);};
const playSiren=()=>{try{const ctx=AudioCtx.get();for(let i=0;i<3;i++)setTimeout(()=>{const o=ctx.createOscillator();const g=ctx.createGain();o.type="sawtooth";o.frequency.setValueAtTime(440+i*80,ctx.currentTime);o.frequency.linearRampToValueAtTime(880+i*80,ctx.currentTime+0.3);g.gain.value=0.04;o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+0.35);},i*400);}catch(e){}};

const Typewriter=({text,run,speed=14})=>{
  const [n,setN]=useState(0);
  useEffect(()=>{if(!run){setN(0);return;}if(speed===0){setN(text.length);return;}let i=0;const id=setInterval(()=>{i++;setN(i);if(i>=text.length)clearInterval(id);},speed);return()=>clearInterval(id);},[text,run,speed]);
  return <span>{text.slice(0,n)}<span style={{color:"#EF4444",animation:"blink 0.6s infinite"}}>{n<text.length?"▍":""}</span></span>;
};

const useHintSystem=(hotspots,foundIds,timerSeconds)=>{
  const [hints,setHints]=useState({});
  const timerRef=useRef(null);
  const startHintTimer=useCallback((hId,delay=45)=>{
    if(timerRef.current) clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>{
      setHints(prev=>({...prev,[hId]:true}));
    },delay*1000);
  },[]);
  const unfound=hotspots.filter(h=>!foundIds.includes(h.id));
  const firstUnfound=unfound[0];
  useEffect(()=>{
    if(firstUnfound&&!hints[firstUnfound.id]){
      startHintTimer(firstUnfound.id,50);
    }
    return()=>{if(timerRef.current)clearTimeout(timerRef.current);};
  },[foundIds.length]);
  return{hints};
};

const Investigation=({caseData,animationsOn,timerSeconds,state,dispatch,onComplete})=>{
  const [linking,setLinking]=useState(null);
  const [feedback,setFeedback]=useState(null);
  const [showGuide,setShowGuide]=useState(false);
  const [time,setTime]=useState(timerSeconds);
  const collected=state.collected;const links=state.links;
  const foundIds=collected.map(c=>c.hotspotId);
  const {hints}=useHintSystem(caseData.hotspots,foundIds,timerSeconds);

  useEffect(()=>{if(state.complete)return;const id=setInterval(()=>setTime(t=>Math.max(0,t-1)),1000);return()=>clearInterval(id);},[state.complete]);
  useEffect(()=>{if(time===0&&!state.complete)onComplete({timeBonus:0});},[time]);

  const allFound=collected.length===caseData.hotspots.length;
  const allLinked=caseData.hotspots.every(h=>links[h.id]?.solved);
  useEffect(()=>{if(allFound&&allLinked&&!state.complete){const timeBonus=Math.round((time/timerSeconds)*10);onComplete({timeBonus});}},[ allFound,allLinked]);

  const handlePick=(h)=>{if(collected.find(c=>c.hotspotId===h.id)) return;playClick();dispatch({type:"collect",hotspotId:h.id});};
  const handleLink=(hotspotId,techId)=>{
    const h=caseData.hotspots.find(x=>x.id===hotspotId);const correct=techId===h.correct;const prev=links[hotspotId]?.attempts||0;
    if(correct){playCorrect();const points=prev===0?15:8;dispatch({type:"link",hotspotId,techId,solved:true,points});setFeedback({kind:"correct",h,techId,points});}
    else{playWrong();dispatch({type:"link",hotspotId,techId,solved:false});const trapMsg=h.traps[techId]||`Re-examine the evidence. Think about what SPECIFICALLY was wrong — input values, code structure, or process?`;setFeedback({kind:"wrong",h,techId,correctId:h.correct,trapMsg});}
  };

  return (
    <div className="screen screen--investigation">
      <div className="topbar">
        <div className="topbar__case"><span className="topbar__code">{caseData.code}</span><span className="topbar__title">{caseData.title}</span></div>
        <div className="topbar__progress">
          <Pill label="Found" v={collected.length} max={caseData.hotspots.length} tone="amber"/>
          <Pill label="Solved" v={caseData.hotspots.filter(h=>links[h.id]?.solved).length} max={caseData.hotspots.length} tone="green"/>
          <div className={`timer ${time<60?"is-low":""}`}>{fmtTime(time)}</div>
        </div>
      </div>
      <div className="invest-grid">
        <div className="invest-scene">
          <Scene caseData={caseData} hotspots={caseData.hotspots} foundIds={foundIds} onPick={handlePick} animationsOn={animationsOn} hints={hints}/>
          <div className="scene-caption">{caseData.company} · {caseData.incidentDate}</div>
          {Object.values(hints).some(Boolean)&&<div style={{position:"absolute",bottom:30,left:"50%",transform:"translateX(-50%)",background:"rgba(245,158,11,0.15)",border:"1px solid rgba(245,158,11,0.4)",padding:"6px 16px",fontFamily:"var(--mono)",fontSize:11,color:"#F59E0B",letterSpacing:"0.15em",pointerEvents:"none"}}>💡 HINT: Check the pulsing hotspot</div>}
        </div>
        <div className="invest-board">
          <SuspectBoard caseData={caseData} collected={collected} links={links} linking={linking} setLinking={setLinking} onLink={handleLink} animationsOn={animationsOn}/>
        </div>
      </div>
      <FieldGuide open={showGuide} onClose={()=>setShowGuide(false)}/>
      <button className="guide-toggle" onClick={()=>setShowGuide(true)}>📖 ISO Field Guide</button>
      {feedback&&<FeedbackModal {...feedback} onClose={()=>setFeedback(null)}/>}
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
//  VERDICT
// ═══════════════════════════════════════════════════════════════
const Verdict=({caseData,state,score,onNextStep,animationsOn})=>{
  const [showCount,setShowCount]=useState(0);
  const max=caseData.hotspots.length*15+20+10;
  const pct=Math.round((score/max)*100);const rank=rankFor(pct);
  useEffect(()=>{if(!animationsOn){setShowCount(score);playReveal();return;}playReveal();const dur=1500;const steps=40;let i=0;const id=setInterval(()=>{i++;setShowCount(Math.round((score*i)/steps));if(i>=steps)clearInterval(id);},dur/steps);return()=>clearInterval(id);},[]);
  const wrong=caseData.hotspots.filter(h=>!state.links[h.id]?.solved||(state.links[h.id]?.attempts||0)>0);
  const solvedFirst=caseData.hotspots.filter(h=>state.links[h.id]?.solved&&(state.links[h.id]?.attempts||0)===0);
  return (
    <div className="screen screen--verdict">
      <div className="verdict__head"><div className="verdict__case">{caseData.code} · {caseData.title}</div><h1>VERDICT</h1></div>
      <div className={`rank-badge ${animationsOn?"in":""}`}>
        <div className="rank-badge__glyph">{rank.glyph}</div>
        <div className="rank-badge__label">{rank.label}</div>
        <div className="rank-badge__pct">{pct}%</div>
        <div className="rank-badge__score"><span>{showCount}</span> / {max} pts</div>
        <div className="rank-badge__quote">"{rank.quote}"</div>
      </div>
      <div className="verdict__cols">
        <div><h3 className="solved-h">SOLVED</h3>{solvedFirst.length===0&&<div className="empty">No first-attempt solves.</div>}{solvedFirst.map(h=>(<div key={h.id} className="solved-card"><div className="solved-card__stamp">SOLVED</div><div className="solved-card__title">{h.evidence.title}</div><div className="solved-card__tech">→ {TECHNIQUES[h.correct].name}</div></div>))}</div>
        <div><h3 className="cold-h">COLD CASES</h3>{wrong.length===0&&<div className="empty">Clean sweep, Detective.</div>}{wrong.map(h=>(<div key={h.id} className="cold-card"><div className="cold-card__title">{h.evidence.title}</div><div className="cold-card__lesson"><b>Should have been:</b> {TECHNIQUES[h.correct].name}<br/><span>{TECHNIQUES[h.correct].definition}</span></div><div className="cold-card__iso">{TECHNIQUES[h.correct].iso}</div></div>))}</div>
      </div>
      <div className="verdict__actions"><button className="btn btn--primary" onClick={onNextStep}>Identify the culprit →</button></div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
//  SUSPECT IDENTIFICATION (with real avatars, randomized each session)
// ═══════════════════════════════════════════════════════════════
const SuspectIdentification=({caseData,score,onArrest,avatarPool})=>{
  const [selected,setSelected]=useState([]);
  const [revealed,setRevealed]=useState(false);
  const [showDefense,setShowDefense]=useState(null);
  const suspects=caseData.suspects;
  const guiltySuspects=suspects.filter(s=>s.guilty);
  const isMulti=guiltySuspects.length>1;
  const max=caseData.hotspots.length*15+20+10;
  const pct=Math.round((score/max)*100);

  const toggleSelect=(id)=>{if(revealed)return;setSelected(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);};

  const handleProceed=()=>{
    const guiltyIds=suspects.filter(s=>s.guilty).map(s=>s.id);
    const correctCount=selected.filter(id=>guiltyIds.includes(id)).length;
    const wrongCount=selected.filter(id=>!guiltyIds.includes(id)).length;
    const bonus=Math.max(0,(correctCount*10)-(wrongCount*5));
    onArrest({bonus,guiltySelected:suspects.filter(s=>selected.includes(s.id)&&s.guilty)});
  };

  return (
    <div style={{minHeight:"100vh",padding:"40px 24px",maxWidth:1000,margin:"0 auto"}}>
      <Particles count={12}/>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontFamily:"var(--mono)",color:"#EF4444",letterSpacing:"0.3em",fontSize:11,marginBottom:12}}>CASE {caseData.code} · STEP 2 OF 3</div>
        <h1 style={{fontFamily:"var(--serif)",fontSize:52,margin:0}}>Identify the <span style={{color:"#F59E0B",fontStyle:"italic"}}>Culprit</span></h1>
        <p style={{fontFamily:"var(--mono)",color:"#9CA3AF",fontSize:13,marginTop:10,maxWidth:560,margin:"10px auto 0",lineHeight:1.6}}>Study the personnel files. Who is responsible for this failure? Your investigation found <b style={{color:"#F59E0B"}}>{pct}%</b> of the evidence.</p>
      </div>

      {/* Defense viewer */}
      {showDefense&&(
        <div className="modal-shade" onClick={()=>setShowDefense(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:620,borderLeft:"4px solid #3B82F6"}}>
            <div style={{fontFamily:"var(--stamp)",fontSize:13,color:"#3B82F6",letterSpacing:"0.2em",marginBottom:12}}>DEFENDANT'S STATEMENT</div>
            <h3 style={{marginTop:0}}>{showDefense.name}</h3>
            <p style={{fontFamily:"var(--mono)",fontSize:13,color:"#F0EDE8",lineHeight:1.7,background:"rgba(59,130,246,0.06)",border:"1px solid rgba(59,130,246,0.2)",padding:"12px 16px"}}>"{showDefense.defense}"</p>
            <div style={{marginTop:16,background:"rgba(245,158,11,0.06)",border:"1px solid rgba(245,158,11,0.2)",padding:"12px 16px"}}>
              <div style={{fontFamily:"var(--mono)",fontSize:10,color:"#F59E0B",letterSpacing:"0.15em",marginBottom:6}}>ISO ANALYSIS:</div>
              <p style={{fontFamily:"var(--mono)",fontSize:12,color:"#9CA3AF",lineHeight:1.6,margin:0}}>{showDefense.defenseISO}</p>
            </div>
            <button className="btn btn--ghost" style={{marginTop:16}} onClick={()=>setShowDefense(null)}>Close</button>
          </div>
        </div>
      )}

      {!revealed&&(
        <div style={{textAlign:"center",fontFamily:"var(--stamp)",fontSize:13,letterSpacing:"0.2em",color:"#F59E0B",marginBottom:24,border:"1px solid rgba(245,158,11,0.3)",padding:"10px 20px",display:"inline-block",position:"relative",left:"50%",transform:"translateX(-50%)"}}>
          {isMulti?`SELECT ALL RESPONSIBLE PARTIES (${guiltySuspects.length} SUSPECTS)`:"SELECT THE RESPONSIBLE PARTY"}
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:20,marginBottom:32}}>
        {suspects.map((s,si)=>{
          const isSel=selected.includes(s.id);
          const avatarKey=avatarPool[si%avatarPool.length];
          const avatarSrc=revealed&&s.guilty?AVATARS[avatarKey].sad:AVATARS[avatarKey].happy;
          return (
            <div key={s.id} style={{position:"relative"}}>
              <button onClick={()=>toggleSelect(s.id)}
                style={{
                  background:isSel?"rgba(239,68,68,0.12)":"rgba(13,17,23,0.85)",
                  border:isSel?"2px solid #EF4444":"2px solid #1f2a36",
                  cursor:revealed?"default":"pointer",padding:0,color:"#F0EDE8",width:"100%",
                  transition:"all 220ms ease",
                  transform:isSel?"translateY(-4px)":"none",
                  boxShadow:isSel?"0 12px 32px rgba(239,68,68,0.25)":"none",
                  position:"relative",overflow:"hidden",
                }}>
                {isSel&&!revealed&&<div style={{position:"absolute",top:6,right:6,width:20,height:20,background:"#EF4444",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",zIndex:2}}>✓</div>}
                {revealed&&<div style={{position:"absolute",top:8,right:8,fontFamily:"var(--stamp)",fontSize:11,padding:"3px 8px",letterSpacing:"0.12em",zIndex:2,background:s.guilty?"#EF4444":"#10B981",color:"#fff"}}>{s.guilty?"GUILTY":"INNOCENT"}</div>}
                <div style={{width:"100%",aspectRatio:"1",background:"#0a0d14",overflow:"hidden"}}>
                  <img src={avatarSrc} alt={s.name} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"top center",display:"block"}}/>
                </div>
                <div style={{padding:"12px 14px",borderTop:"1px solid #1f2a36",textAlign:"left"}}>
                  <div style={{fontFamily:"var(--stamp)",fontSize:14,letterSpacing:"0.06em"}}>{s.name}</div>
                  <div style={{fontFamily:"var(--mono)",fontSize:10,color:"#9CA3AF",marginTop:3}}>{s.role}</div>
                  {revealed&&(
                    <div style={{marginTop:8,fontFamily:"var(--mono)",fontSize:10,lineHeight:1.5,color:s.guilty?"#EF4444":"#10B981"}}>
                      {s.guilty?`⚠ ${s.guiltReason}`:`✓ ${s.innocentReason}`}
                    </div>
                  )}
                </div>
              </button>
              {/* Hear their defense */}
              <button onClick={()=>setShowDefense(s)} style={{width:"100%",background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.2)",borderTop:"none",padding:"8px",fontFamily:"var(--mono)",fontSize:10,color:"#3B82F6",cursor:"pointer",letterSpacing:"0.1em"}}>
                📢 Hear defense
              </button>
            </div>
          );
        })}
      </div>

      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
        {!revealed?(
          <>
            {isMulti&&<div style={{fontFamily:"var(--mono)",fontSize:12,color:"#F59E0B",marginBottom:4}}>Multiple parties may share responsibility.</div>}
            <div style={{fontFamily:"var(--mono)",fontSize:12,color:"#9CA3AF",maxWidth:480,textAlign:"center",lineHeight:1.6}}>Selected: <b style={{color:"#F0EDE8"}}>{selected.length}</b> suspect{selected.length!==1?"s":""}. {selected.length===0?"Choose at least one to proceed.":"Click 'Lock In' when ready."}</div>
            <button className="btn btn--primary" style={{fontSize:15,padding:"14px 32px"}} disabled={selected.length===0} onClick={()=>setRevealed(true)}>🔒 Lock In My Suspects</button>
          </>
        ):(
          <>
            <div style={{fontFamily:"var(--serif)",fontStyle:"italic",fontSize:18,color:"#F59E0B",textAlign:"center",maxWidth:560,marginBottom:8}}>"Every failure has an author. Now you know who signed this one."</div>
            <button className="btn btn--primary" style={{fontSize:16,padding:"14px 32px"}} onClick={handleProceed}>Make the arrest → 🚔</button>
          </>
        )}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
//  CASE IMPROVEMENT
// ═══════════════════════════════════════════════════════════════
const CaseImprovement=({caseData,totalScore,maxScore,onNext,isLast})=>{
  const [selected,setSelected]=useState([]);
  const improvements=caseData.improvements;const MAX_SELECT=3;
  const toggle=(id)=>{setSelected(prev=>{if(prev.includes(id))return prev.filter(x=>x!==id);if(prev.length>=MAX_SELECT)return prev;return[...prev,id];});};
  const bonusPts=selected.reduce((sum,id)=>sum+(improvements.find(i=>i.id===id)?.pts||0),0);
  const currentPct=Math.round((totalScore/maxScore)*100);const rank=rankFor(currentPct);
  return (
    <div className="screen--improve">
      <Particles count={15}/>
      <div className="improve__head">
        <div className="improve__eyebrow">CASE {caseData.code} · STEP 3 OF 3</div>
        <h1>Improve the <em>Test Suite</em></h1>
        <p className="improve__subtitle">The culprit is behind bars. Now prevent the next failure. Select up to <b>3 improvements</b> you would implement based on the ISO techniques you just applied.</p>
      </div>
      <div style={{textAlign:"center",marginBottom:24}}><div className="improve__instruction">SELECT UP TO 3 IMPROVEMENTS · {selected.length}/{MAX_SELECT}</div></div>
      <div className="improve__grid">
        {improvements.map(imp=>{const isSel=selected.includes(imp.id);return(
          <button key={imp.id} className={`improve-card ${isSel?"is-selected":""}`} onClick={()=>toggle(imp.id)}>
            <div className="improve-card__icon">{imp.icon}</div>
            <div className="improve-card__title">{imp.title}</div>
            <div className="improve-card__desc">{imp.desc}</div>
            <div className="improve-card__iso">{imp.iso}</div>
            <div className="improve-card__pts">+{imp.pts} pts</div>
          </button>
        );})}
      </div>
      <div className="improve__score-preview">
        <div className="improve__score-label">Current Performance</div>
        <div className="improve__score-val">{currentPct}%</div>
        <div className="improve__bonus">{selected.length>0?`+${bonusPts} improvement bonus available`:"Select improvements to earn bonus points"}</div>
      </div>
      <div className="improve__actions"><button className="btn btn--primary" onClick={()=>onNext(bonusPts)}>{isLast?"Final Verdict →":"Next Case →"}</button></div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
//  FINAL SUMMARY
// ═══════════════════════════════════════════════════════════════
const FinalSummary=({scores,name,onRestart,onDashboard,animationsOn})=>{
  const total=scores.reduce((a,b)=>a+b.score,0);const totalMax=scores.reduce((a,b)=>a+b.max,0);
  const pct=Math.round((total/totalMax)*100);const rank=rankFor(pct);
  return (
    <div className="screen screen--verdict screen--final">
      <Particles count={20}/>
      <div className="verdict__head"><div className="verdict__case">ISO DETECTIVE · COMPLETE CASE FILE</div><h1>FINAL VERDICT</h1>{name&&<div style={{fontFamily:"var(--mono)",color:"#9CA3AF",fontSize:13,marginTop:8}}>Detective {name}</div>}</div>
      <div className={`rank-badge rank-badge--big ${animationsOn?"in":""}`}>
        <div className="rank-badge__glyph">{rank.glyph}</div>
        <div className="rank-badge__label">{rank.label}</div>
        <div className="rank-badge__pct">{pct}%</div>
        <div className="rank-badge__score">{total} / {totalMax} pts total</div>
        <div className="rank-badge__quote">"{rank.quote}"</div>
      </div>
      <table className="case-table"><thead><tr><th>Case</th><th>Score</th><th>%</th><th>Rank</th></tr></thead><tbody>{scores.map(s=>{const p=Math.round((s.score/s.max)*100);const r=rankFor(p);return(<tr key={s.id}><td>{s.title}</td><td>{s.score} / {s.max}</td><td>{p}%</td><td>{r.glyph} {r.label}</td></tr>);})}</tbody></table>
      <div className="verdict__actions"><button className="btn btn--primary" onClick={onRestart}>Reopen the file</button><button className="btn btn--ghost" onClick={onDashboard}>Teacher dashboard</button></div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
//  TEACHER DASHBOARD
// ═══════════════════════════════════════════════════════════════
const Stat=({label,v,sub})=>(<div className="stat"><div className="stat__l">{label}</div><div className="stat__v">{v}</div><div className="stat__s">{sub}</div></div>);
const Dashboard=({onBack})=>{
  const [auth,setAuth]=useState(false);const [pass,setPass]=useState("");
  if(!auth)return(<div className="screen screen--dash-auth"><div className="dash-gate"><h2>Teacher Access</h2><p>Passcode (demo: <b>9119</b>)</p><input value={pass} onChange={e=>setPass(e.target.value)} type="password"/><button className="btn btn--primary" onClick={()=>setAuth(pass==="9119")}>Unlock</button><button className="btn btn--ghost" onClick={onBack}>← Back</button></div></div>);
  const students=[{n:"M. Demir",s:218,r:"Chief Detective"},{n:"E. Aydın",s:187,r:"Senior Investigator"},{n:"A. Şahin",s:241,r:"Legendary Detective"},{n:"B. Kaya",s:142,r:"Senior Investigator"},{n:"C. Yıldız",s:95,r:"Rookie Detective"},{n:"D. Öztürk",s:201,r:"Chief Detective"},{n:"F. Polat",s:178,r:"Senior Investigator"},{n:"G. Acar",s:223,r:"Chief Detective"}];
  const techDifficulty=[{n:"Equivalence Partitioning",pct:91},{n:"Boundary Value Analysis",pct:84},{n:"Decision Table",pct:62},{n:"State Transition",pct:58},{n:"Pairwise",pct:46},{n:"Statement Testing",pct:78},{n:"Branch Testing",pct:64},{n:"MC/DC",pct:28},{n:"Error Guessing",pct:71},{n:"Exploratory",pct:67}];
  return (<div className="screen screen--dashboard"><div className="dash-head"><div><div className="dash-eyebrow">ISO DETECTIVE · LIVE</div><h1>Teacher Dashboard</h1></div><button className="btn btn--ghost" onClick={onBack}>← Back</button></div><div className="dash-stats"><Stat label="Joined" v={students.length+4} sub="of 18 enrolled"/><Stat label="Submitted" v={students.length} sub="3 in progress"/><Stat label="Mean score" v={Math.round(students.reduce((a,b)=>a+b.s,0)/students.length)} sub="/ 270 pts"/><Stat label="Median rank" v="Senior" sub="Investigator"/></div><div className="dash-grid"><div className="dash-card"><h3>Technique difficulty</h3><div className="diff-list">{techDifficulty.map(t=>(<div key={t.n} className="diff-row"><span className="diff-row__n">{t.n}</span><div className="diff-row__bar"><div style={{width:`${t.pct}%`,height:"100%",background:t.pct<50?"#EF4444":t.pct<70?"#F59E0B":"#10B981"}}/></div><span className="diff-row__v">{t.pct}%</span></div>))}</div></div><div className="dash-card dash-card--students"><h3>Students</h3><table><thead><tr><th>Name</th><th>Score</th><th>Rank</th></tr></thead><tbody>{students.sort((a,b)=>b.s-a.s).map(s=>(<tr key={s.n}><td>{s.n}</td><td>{s.s}</td><td>{s.r}</td></tr>))}</tbody></table></div></div></div>);
};

// ═══════════════════════════════════════════════════════════════
//  STATE REDUCER
// ═══════════════════════════════════════════════════════════════
const reducer=(state,a)=>{
  switch(a.type){
    case "collect":{if(state.collected.find(c=>c.hotspotId===a.hotspotId))return state;return{...state,collected:[...state.collected,{hotspotId:a.hotspotId}]};}
    case "link":{const prev=state.links[a.hotspotId]||{attempts:0,solved:false,points:0};const attempts=prev.attempts+1;const solved=a.solved||prev.solved;const points=a.solved&&!prev.solved?a.points:prev.points;return{...state,links:{...state.links,[a.hotspotId]:{techId:a.solved?a.techId:prev.techId,attempts,solved,points}}};}
    case "complete":return{...state,complete:true,timeBonus:a.timeBonus};
    default:return state;
  }
};
const initState=()=>({collected:[],links:{},complete:false,timeBonus:0});

// ═══════════════════════════════════════════════════════════════
//  ROOT APP
// ═══════════════════════════════════════════════════════════════
const App=()=>{
  const [view,setView]=useState("landing");
  const [caseIdx,setCaseIdx]=useState(0);
  const [name,setName]=useState("");
  const [scores,setScores]=useState([]);
  const [investState,setInvestState]=useState(initState());
  const [arrestData,setArrestData]=useState(null);
  const [avatarPool]=useState(()=>shuffleAvatarPool());
  const animationsOn=true;const timerSeconds=300;

  const caseData=CASES[caseIdx];
  const dispatch=(a)=>setInvestState(s=>reducer(s,a));

  const startGame=(n,selectedCaseIdx)=>{setName(n);setCaseIdx(selectedCaseIdx);setInvestState(initState());setView("case");};

  const completeInvestigation=({timeBonus})=>{
    const linkPoints=Object.values(investState.links).reduce((a,l)=>a+(l.points||0),0);
    const evidencePoints=investState.collected.length*5;
    const allFirst=caseData.hotspots.every(h=>investState.links[h.id]?.solved&&investState.links[h.id]?.attempts===1);
    const allFound=investState.collected.length===caseData.hotspots.length;
    const perfect=allFirst&&allFound?20:0;
    const score=linkPoints+evidencePoints+timeBonus+perfect;
    const max=caseData.hotspots.length*(15+5)+10+20;
    setScores(s=>[...s,{id:caseData.id,title:caseData.title,score,max,timeBonus,perfect}]);
    setInvestState(s=>({...s,complete:true,timeBonus}));
    setView("verdict");
  };

  const handleArrest=({bonus,guiltySelected})=>{setArrestData({bonus,guiltySelected});playSiren();setView("arrest");};

  const afterArrest=()=>{
    if(arrestData?.bonus>0)setScores(prev=>prev.map((s,i)=>i===prev.length-1?{...s,score:s.score+arrestData.bonus}:s));
    setView("improve");
  };

  const afterImprovement=(improveBonus)=>{
    if(improveBonus>0)setScores(prev=>prev.map((s,i)=>i===prev.length-1?{...s,score:s.score+improveBonus,max:s.max+60}:s));
    // Always go to final after one case (single case per session)
    setView("final");
  };

  const restart=()=>{setCaseIdx(0);setInvestState(initState());setScores([]);setArrestData(null);setView("landing");};
  const lastScore=scores[scores.length-1];

  return (
    <div className={`app ${animationsOn?"":"no-anim"}`}>
      <FilmGrain/><Vignette/>
      {view!=="landing"&&view!=="arrest"&&<Particles count={16}/>}
      {view==="landing"&&<Landing onStart={startGame} onTeacher={()=>setView("dashboard")}/>}
      {view==="case"&&<CaseFileOpen caseData={caseData} animationsOn={animationsOn} onBegin={()=>setView("invest")}/>}
      {view==="invest"&&<Investigation caseData={caseData} animationsOn={animationsOn} timerSeconds={timerSeconds} state={investState} dispatch={dispatch} onComplete={completeInvestigation}/>}
      {view==="verdict"&&lastScore&&<Verdict caseData={caseData} state={investState} score={lastScore.score} onNextStep={()=>setView("suspect")} animationsOn={animationsOn}/>}
      {view==="suspect"&&lastScore&&<SuspectIdentification caseData={caseData} score={lastScore.score} onArrest={handleArrest} avatarPool={avatarPool}/>}
      {view==="arrest"&&<ArrestScreen caseData={caseData} guiltySelected={arrestData?.guiltySelected||[]} bonus={arrestData?.bonus||0} onContinue={afterArrest} avatarPool={avatarPool}/>}
      {view==="improve"&&lastScore&&<CaseImprovement caseData={caseData} totalScore={lastScore.score} maxScore={lastScore.max} onNext={afterImprovement} isLast={true}/>}
      {view==="final"&&<FinalSummary scores={scores} name={name} onRestart={restart} onDashboard={()=>setView("dashboard")} animationsOn={animationsOn}/>}
      {view==="dashboard"&&<Dashboard onBack={()=>setView("landing")}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
